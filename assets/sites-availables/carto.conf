<VirtualHost *:80>
    ServerName map.recovery.box

    DocumentRoot /data/brouter/www
    
    <Directory /data/brouter/www>
        Options Indexes FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    #To BRouter
    ProxyPass /brouter http://127.0.0.1:17777
    ProxyPassReverse /brouter http://127.0.0.1:17777

    ##To TileServer-GL
    ProxyPreserveHost On
    ProxyPass /tiles/ http://127.0.0.1:8090/
    ProxyPassReverse /tiles/ http://127.0.0.1:8090/

    ErrorLog ${APACHE_LOG_DIR}/carto_error.log
    CustomLog ${APACHE_LOG_DIR}/carto_access.log combined
</VirtualHost>
