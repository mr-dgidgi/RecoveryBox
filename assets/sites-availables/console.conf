<VirtualHost *:80>
    ServerName console.recovery.box

    ProxyPass        / http://127.0.0.1:4200/
    ProxyPassReverse / http://127.0.0.1:4200/

    <Location />
        Require all granted
    </Location>

    ErrorLog ${APACHE_LOG_DIR}/console_error.log
    CustomLog ${APACHE_LOG_DIR}/console_access.log combined
</VirtualHost>